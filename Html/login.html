<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css/login.css">
    <title>Login</title>
</head>
<body>
    <div class="login">
        <div class="continner1">
            <img src="" alt="">
        </div>
        <div class="continner2">
            <p>Login Form</p>
            <form>
                <label for="email">Email:</label><br>
                <input type="email" name="email" id="email" required placeholder="Enter Email..."><br><br>
                <label for="password">Password:</label><br>
                <input type="password" name="password" id="password" required placeholder="Enter password..."><br><br>
                <a href="#">Forget Password?</a><br><br>
                <label for="gender">Gender:</label><br>
                <label for="Male">Male</label>
                <input type="radio" name="gender" id="gender">
                <label for="Female">Female</label>
                <input type="radio" name="gender" id="gender"><br><br>
                <input type="button" name="login" id="login" value="Login"><br><br>
                <a href="#">Do not have an account?</a>
            </form>
        </div>
    </div>
    
</body>
</html>
